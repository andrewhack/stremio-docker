services:
  stremio:
    # Local build (default). For a prebuilt image from CI, comment out `build:` and set one of:
    # image: tsaridas/stremio-docker:nightly-nvidia   # nightly schedule (bleeding edge)
    # image: tsaridas/stremio-docker:latest-nvidia    # last Docker Hub release only (stable)
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    image: stremio-docker:nvidia
    runtime: nvidia
    restart: unless-stopped
    environment:
      - NO_CORS=1
      - AUTO_SERVER_URL=0
      - IPADDRESS=192.168.0.100
      - SERVER_URL=https://192.168.0.100:8080/
      - WEBUI_INTERNAL_PORT=8080
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    ports:
      - "8085:8080"
      # BitTorrent peer port (incoming connections). server.js listens on TCP 6881.
      # Keep the same port on both sides; the engine announces its listen port to peers.
      # Reachability from the internet also requires a WAN->LAN DNAT on the router
      # (forward WAN tcp/6881 -> <host LAN IP> tcp/6881). Publishing here alone is LAN-only.
      - "6881:6881/tcp"
      # UDP is optional: the engine carries peer data over TCP (no uTP); UDP only serves
      # DHT peer discovery. Harmless to publish, can slightly improve discoverability.
      - "6881:6881/udp"
    devices:
      # Intel iGPU for VAAPI. The NVIDIA GPU is provided via `runtime: nvidia` above.
      - "/dev/dri:/dev/dri"
    volumes:
      - "./stremio-data:/root/.stremio-server"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 256M
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, compute]
