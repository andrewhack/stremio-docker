services:
  stremio:
    # Local dual-GPU build (Intel VAAPI + NVIDIA NVENC). Image name is distinct from the
    # upstream tsaridas image so it never overlaps with it.
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    image: stremio-docker-dual:latest
    runtime: nvidia          # REQUIRED for the GPU: injects libcuda/NVENC libs. Env vars alone do nothing.
    restart: unless-stopped
    environment:
      - NO_CORS=1
      - AUTO_SERVER_URL=1
      # HTTPS for a custom domain (recommended; webOS/Tizen reject plain HTTP / self-signed).
      # Set these to YOUR domain and place the cert as certificates.pem in the data volume
      # (./stremio-data/certificates.pem). Without them the server serves plain HTTP, and a
      # browser loading the player over https://<your-domain> cannot reach the streaming server.
      # - DOMAIN=your.domain.tld
      # - CERT_FILE=certificates.pem
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      # Optional torrent tuning (unset = stock server defaults):
      # - BT_DOWNLOAD_SPEED_HARD_LIMIT=10485760
      # - BT_MAX_CONNECTIONS=120
    ports:
      # Web player + streaming-server API, both via nginx (the normal access path).
      - "8080:8080"
      # No BitTorrent peer port: the stock Stremio engine is outbound-only (verified — nothing
      # binds 6881; it dials peers outward but never listens), so forwarding 6881 has no effect.
      # See the "Peer connectivity" section in NVIDIA-GPU.md / README.md.
      # Streaming-server endpoints (server.js listens on all interfaces). Optional/direct access;
      # the normal path is via nginx on 8080 above.
      - "11470:11470"
      - "12470:12470"
    devices:
      # Intel iGPU for VAAPI. The NVIDIA GPU is provided via `runtime: nvidia` above.
      - "/dev/dri:/dev/dri"
    volumes:
      - "./stremio-data:/root/.stremio-server"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 256M
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, compute]
